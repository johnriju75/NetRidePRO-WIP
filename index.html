<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetRide Pro | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This hex (#09090b) is the exact background used in the newest Vercel/Next.js dark themes */
        body {
            background-color: #09090b; 
        }
    </style>
</head>
<body class="text-zinc-50 flex items-center justify-center min-h-screen font-sans antialiased">
    <div class="text-center p-8 max-w-sm">
        
        <div class="mb-10">
            <h1 class="text-4xl font-bold tracking-tighter text-white">
                NetRide<span class="text-indigo-500">PRO</span>
            </h1>
        </div>

        <div class="space-y-3">
            <p class="text-sm font-bold text-indigo-500 uppercase tracking-[0.3em]">
                Launching SOON
            </p>
            <div class="h-[1px] w-12 bg-zinc-800 mx-auto"></div>
            <p class="text-zinc-400 text-sm font-light leading-relaxed">
                Smart tracking for Australian rideshare drivers.
            </p>
        </div>

        <div class="mt-12 flex items-center justify-center space-x-2 opacity-50">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-500 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-600"></span>
            </span>
            <span class="text-[10px] font-medium text-zinc-500 uppercase tracking-widest">Systems Online</span>
        </div>

    </div>
</body>
</html>
